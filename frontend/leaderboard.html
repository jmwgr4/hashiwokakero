<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hashiwokakero - Leaderboard</title>
    <link rel="stylesheet" href="/style.css"> 
    </head>
<body>
    <header>
        <h1>🏆 Hashiwokakero Top Times</h1>
        <a href="index.html" class="back-to-game-btn">⬅️ Back to Game</a>
    </header>

    <div class="leaderboard-container">
        <div class="difficulty-filter">
            <button class="filter-btn active" data-difficulty="easy">Easy</button>
            <button class="filter-btn" data-difficulty="medium">Medium</button>
            <button class="filter-btn" data-difficulty="hard">Hard</button>
        </div>

        <div id="leaderboard-display">
            <p>Loading leaderboard data...</p>
            </div>
    </div>
    
    <footer class="names">
        <h1>Bagabaldo, Ostos, Rollorata</h1>
    </footer>
    
    <script src="/script.js"></script> 
</body>
</html>
